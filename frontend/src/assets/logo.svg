<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 740 740" role="img" aria-labelledby="title desc">
  <title id="title">EducatorTools Mark Matrix icon</title>
  <desc id="desc">Rounded assessment grid icon with a central check mark.</desc>
  <defs>
    <linearGradient id="tileBlue" x1="120" y1="100" x2="520" y2="610" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="tileGreen" x1="270" y1="220" x2="610" y2="660" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="tileGold" x1="170" y1="130" x2="680" y2="620" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FBBF24"/>
      <stop offset="1" stop-color="#F97316"/>
    </linearGradient>
    <filter id="drop" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#0F172A" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g transform="translate(50 50)" filter="url(#drop)">
    <rect x="30" y="30" width="580" height="580" rx="96" fill="#0F172A"/>
    <rect x="82" y="84" width="132" height="132" rx="34" fill="url(#tileBlue)"/>
    <rect x="254" y="84" width="132" height="132" rx="34" fill="#FFFFFF" opacity="0.95"/>
    <rect x="426" y="84" width="132" height="132" rx="34" fill="url(#tileGold)"/>
    <rect x="82" y="256" width="132" height="132" rx="34" fill="#FFFFFF" opacity="0.95"/>
    <rect x="254" y="256" width="132" height="132" rx="34" fill="url(#tileGreen)"/>
    <rect x="426" y="256" width="132" height="132" rx="34" fill="#FFFFFF" opacity="0.95"/>
    <rect x="82" y="428" width="132" height="132" rx="34" fill="url(#tileGold)"/>
    <rect x="254" y="428" width="132" height="132" rx="34" fill="#FFFFFF" opacity="0.95"/>
    <rect x="426" y="428" width="132" height="132" rx="34" fill="url(#tileBlue)"/>
    <path d="M210 338l84 84 168-190" fill="none" stroke="#0F172A" stroke-width="50" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M210 338l84 84 168-190" fill="none" stroke="#FFFFFF" stroke-width="30" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
